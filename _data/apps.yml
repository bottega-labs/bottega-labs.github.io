        en: Organize cards into topic-based decks for systematic study
    - icon: "🎯"
      title:
        ko: 집중 학습
        en: Focused Study
      desc:
        ko: 필요한 카드만 반복 학습하여 학습 효율을 높이세요
        en: Boost efficiency by repeatedly studying only the cards you need

- id: my-tally
  name: My Tally
  tagline:
    ko: 시간·횟수·금액, 기록하고 목표까지
