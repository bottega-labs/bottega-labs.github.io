  accent: "#0A84FF"
  accent_rgb: "10, 132, 255"
  status: live
  app_store_id: "6757023908"
  google_play_id: null
  features:
    - icon: "📝"
      title:
        ko: 무엇이든 기록
        en: Log Anything
      desc:
        ko: 시간(분)·체크(횟수)·금액 등 원하는 방식으로 일상을 기록하세요
