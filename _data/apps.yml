- id: card-memorizer
  name: Card Memorizer
  tagline:
    ko: 카드로 외우는 가장 스마트한 방법
    en: The smartest way to memorize with cards
  accent: "#7C3AED"
  accent_rgb: "124, 58, 237"
  status: live
  app_store_id: "6504581198"
  google_play_id: null
  features:
    - icon: "📷"
      title:
        ko: 카메라로 카드 생성
        en: Create Cards with Camera
      desc:
        ko: 사진 속 글자를 인식해 카드를 자동으로 만드세요
        en: Recognize text in photos to create cards automatically
    - icon: "🃏"
      title:
        ko: 플래시카드
